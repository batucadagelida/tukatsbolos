<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukats - Gestió de Batucada</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #DCF23A; margin: 0; padding: 0; }
        
        .custom-scrollbar { -webkit-overflow-scrolling: touch; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        /* Alçada específica per mostrar aprox 3 persones */
        .person-list-container {
            max-height: 150px; /* Mòbil */
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            .person-list-container {
                max-height: 220px; /* Desktop */
            }
        }

        .person-selected {
            outline: 3px solid #16a34a;
            outline-offset: 2px;
            background-color: white !important;
            z-index: 10;
        }

        .btn-3d-raised {
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.2);
            transform: translateY(-2px);
            transition: all 0.1s ease;
        }
        .btn-3d-pushed {
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.2);
            transform: translateY(2px);
            background-color: rgba(0,0,0,0.05);
        }

        .date-tab, .weather-tab {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.15);
        }

        html, body, #root {
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .clickable-title {
            transition: all 0.2s;
        }
        .clickable-title:hover {
            filter: brightness(0.9);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, deleteDoc, addDoc, query, getDoc } from "firebase/firestore";

        const { useState, useEffect, useMemo } = React;

        const productionConfig = {
            apiKey: "AIzaSyAbqfNeh1p-jGp0vGl6K85N-SJSi7DPwn0",
            authDomain: "tukatsbolos.firebaseapp.com",
            projectId: "tukatsbolos",
            storageBucket: "tukatsbolos.firebasestorage.app",
            messagingSenderId: "74618830888",
            appId: "1:74618830888:web:a8e08918d802ab1498751d"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : productionConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tukats-batucada-v1';

        const Icon = ({ name, size = 16, className = "" }) => {
            // Colors per als icones del temps (Rellens)
            const sunColor = "#FACC15"; // Groc intens
            const cloudColor = "#CBD5E1"; // Gris blau clar
            const rainColor = "#3B82F6"; // Blau marí
            const lightningColor = "#FDE047"; // Groc elèctric
            const snowColor = "#93E6FB"; // Blau gel

            const icons = {
                plus: <path d="M12 5v14M5 12h14" stroke="currentColor" fill="none" />,
                'log-out': <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" fill="none" />,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" stroke="currentColor" fill="none"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" fill="none"/></>,
                'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" stroke="currentColor" fill="none"/><circle cx="12" cy="10" r="3" stroke="currentColor" fill="none"/></>,
                clock: <><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/><polyline points="12 6 12 12 16 14" stroke="currentColor" fill="none"/></>,
                hourglass: <><path d="M5 2h14M5 22h14M15 2v5l-3 3-3-3V2M9 22v-5l3-3 3 3v5" stroke="currentColor" fill="none"/></>,
                key: <><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.778-7.778Zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3-3.5 3.5Z" stroke="currentColor" fill="none"/></>,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" fill="none"/></>,
                info: <><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/><line x1="12" y1="16" x2="12" y2="12" stroke="currentColor"/><line x1="12" y1="8" x2="12.01" y2="8" stroke="currentColor"/></>,
                car: <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" stroke="currentColor" fill="none"/><circle cx="7" cy="17" r="2" stroke="currentColor" fill="none"/><circle cx="17" cy="17" r="2" stroke="currentColor" fill="none"/></>,
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" stroke="currentColor" fill="none" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" stroke="currentColor" fill="none" />,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" fill="none" />,
                settings: <><circle cx="12" cy="12" r="3" stroke="currentColor" fill="none"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" fill="none"/></>,
                user: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="currentColor" fill="none" />,
                'chevron-up': <polyline points="18 15 12 9 6 15" stroke="currentColor" fill="none" />,
                'chevron-down': <polyline points="6 9 12 15 18 9" stroke="currentColor" fill="none" />,
                
                // Weather Icons (Filled Style)
                sun: <circle cx="12" cy="12" r="7" fill={sunColor} />,
                cloud: <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-1-4.1-4.6-7-8.9-7-3.6 0-6.7 2-8.1 4.9C1.1 12.1 3 14 3 14.5c0 2.5 2 4.5 4.5 4.5h10Z" fill={cloudColor} />,
                'cloud-sun': <>
                    <circle cx="16" cy="8" r="5" fill={sunColor} />
                    <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-1-4.1-4.6-7-8.9-7-3.6 0-6.7 2-8.1 4.9C1.1 12.1 3 14 3 14.5c0 2.5 2 4.5 4.5 4.5h10Z" fill={cloudColor} />
                </>,
                'cloud-rain': <>
                    <path d="M17.5 17c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-1-4.1-4.6-7-8.9-7-3.6 0-6.7 2-8.1 4.9C1.1 10.1 3 12 3 12.5c0 2.5 2 4.5 4.5 4.5h10Z" fill={cloudColor} />
                    <path d="M8 18v2M12 19v2M16 18v2" stroke={rainColor} strokeWidth="2.5" strokeLinecap="round" />
                </>,
                'cloud-lightning': <>
                    <path d="M17.5 17c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-1-4.1-4.6-7-8.9-7-3.6 0-6.7 2-8.1 4.9C1.1 10.1 3 12 3 12.5c0 2.5 2 4.5 4.5 4.5h10Z" fill={cloudColor} />
                    <path d="m13 15-3 4h5l-3 4" fill={lightningColor} />
                </>,
                snowflake: <path d="M12 2l1.5 3h3l-2.5 2 1 3-3-2-3 2 1-3-2.5-2h3zM5 12l1.5 3h3l-2.5 2 1 3-3-2-3 2 1-3-2.5-2h3zM19 12l1.5 3h3l-2.5 2 1 3-3-2-3 2 1-3-2.5-2h3z" fill={snowColor}/>
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const DEFAULT_MEMBERS = ["Jesus", "Merche", "Txis", "Josep", "Nacho", "Mon", "Claudia", "Toñi", "Alba", "Viñet", "Evelyn", "Dahna", "DavidB", "David", "Xavi", "Johny", "Valentin", "JosepA", "Merce", "Lorena", "Bruna", "Emily", "Valentina", "Carmen", "Maria", "Marta", "Paula", "Ona", "Aina", "Lluis", "Ernest"].sort();
        const INSTRUMENTS = ["1a", "2a", "3a", "Caixa", "Timba", "Xapa", "Tamborin", "Repe"];
        const MESOS = ["Gener", "Febrer", "Març", "Abril", "Maig", "Juny", "Juliol", "Agost", "Setembre", "Octubre", "Novembre", "Desembre"];
        const DIES_SETMANA = ["Dg", "Dl", "Dt", "Dc", "Dj", "Dv", "Ds"];

        const WeatherBadge = ({ lugar, fecha, hora }) => {
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const fetchWeather = async () => {
                    if (!lugar || !fecha || !hora) return;

                    const [y, m, d] = fecha.split('-').map(Number);
                    const boloDate = new Date(y, m - 1, d);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    
                    const diffDays = Math.ceil((boloDate - today) / (1000 * 60 * 60 * 24));

                    if (diffDays < 0 || diffDays > 16) {
                        setWeather(null);
                        return;
                    }

                    Loading(true);
                    try {
                        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(lugar)}&count=1&language=es&format=json`);
                        const geoData = await geoRes.json();
                        
                        let lat, lon;
                        if (!geoData.results || geoData.results.length === 0) {
                            const geoResFallback = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(lugar + ', Catalunya')}&count=1&language=es&format=json`);
                            const geoDataFallback = await geoResFallback.json();
                            if (!geoDataFallback.results) {
                                setWeather({ error: true });
                                return;
                            }
                            lat = geoDataFallback.results[0].latitude;
                            lon = geoDataFallback.results[0].longitude;
                        } else {
                            lat = geoData.results[0].latitude;
                            lon = geoData.results[0].longitude;
                        }

                        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=weather_code,temperature_2m&start_date=${fecha}&end_date=${fecha}&timezone=auto`);
                        const weatherData = await weatherRes.json();

                        if (weatherData.hourly) {
                            const hourInt = parseInt(hora.split(':')[0]);
                            const code = weatherData.hourly.weather_code[hourInt];
                            const temp = Math.round(weatherData.hourly.temperature_2m[hourInt]);
                            
                            let icon = "sun";
                            if (code >= 1 && code <= 3) icon = "cloud-sun";
                            else if (code >= 45 && code <= 48) icon = "cloud";
                            else if (code >= 51 && code <= 67) icon = "cloud-rain";
                            else if (code >= 71 && code <= 77) icon = "snowflake";
                            else if (code >= 80 && code <= 82) icon = "cloud-rain";
                            else if (code >= 95 && code <= 99) icon = "cloud-lightning";

                            setWeather({ icon, temp });
                        }
                    } catch (e) {
                        setWeather({ error: true });
                    } finally {
                        setLoading(false);
                    }
                };

                fetchWeather();
            }, [lugar, fecha, hora]);

            if (loading) return (
                <div className="absolute -top-4 right-16 md:right-20 w-14 h-14 md:w-16 md:h-16 rounded-xl flex items-center justify-center bg-white weather-tab z-20 border border-black/10">
                    <div className="w-4 h-4 border-2 border-green-600 border-t-transparent rounded-full loading-spin"></div>
                </div>
            );

            if (!weather || weather.error) return null;

            return (
                <div className="absolute -top-4 right-16 md:right-20 w-14 h-14 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center weather-tab z-20 bg-white text-black border border-black/5">
                    <Icon name={weather.icon} size={32} className="mb-0.5" />
                    <span className="text-xs md:text-sm font-black leading-none">{weather.temp}º</span>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [bolos, setBolos] = useState([]);
            const [selectedBolo, setSelectedBolo] = useState(null);
            const [activeTab, setActiveTab] = useState('instruments');
            
            const [members, setMembers] = useState(DEFAULT_MEMBERS);
            const [attendance, setAttendance] = useState({});
            const [assignments, setAssignments] = useState({});
            const [carData, setCarData] = useState(Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })));
            const [foodData, setFoodData] = useState({ standard: [], vegan: [], glutenFree: [], glutenFreeVegan: [] });
            const [boloSettings, setBoloSettings] = useState({ carsEnabled: false, foodEnabled: false });
            const [carCosts, setCarCosts] = useState({ enabled: false, distancia: "", consum: "6.5", preuLitre: "1.40", propuesta: "" });
            
            const [settings, setSettings] = useState({ userPass: "TUKATS", adminPass: "ADMIN" });
            const [isLoading, setIsLoading] = useState(true);
            const [personToMove, setPersonToMove] = useState(null);

            const [showBoloModal, setShowBoloModal] = useState(false);
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [showMembersModal, setShowMembersModal] = useState(false);
            const [editingBoloData, setEditingBoloData] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(async () => {
                            await signInAnonymously(auth);
                        });
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), snap => {
                    if (snap.exists()) setSettings(snap.data());
                });
                const unsubMembers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'members_list', 'current'), snap => {
                    if (snap.exists()) {
                        setMembers((snap.data().names || []).sort());
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members_list', 'current'), { names: DEFAULT_MEMBERS, disabled: [] });
                    }
                });
                const unsubBolos = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bolos'), snap => {
                    const bolosList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBolos(bolosList);
                    if (selectedBolo) {
                        const updated = bolosList.find(d => d.id === selectedBolo.id);
                        if (updated) setSelectedBolo(updated);
                    }
                });
                return () => { unsubSettings(); unsubMembers(); unsubBolos(); };
            }, [user, selectedBolo?.id]);

            useEffect(() => {
                if (!user || !selectedBolo) return;
                setIsLoading(true);
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', selectedBolo.id), snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setAttendance(d.attendance || {});
                        setAssignments(d.assignments || {});
                        setCarData(d.carData || Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })));
                        const fd = d.foodData || {};
                        setFoodData({
                            standard: fd.standard || [], vegan: fd.vegan || [],
                            glutenFree: fd.glutenFree || [], glutenFreeVegan: fd.glutenFreeVegan || []
                        });
                        setBoloSettings(d.boloSettings || { carsEnabled: false, foodEnabled: false });
                        const cc = d.carCosts || {};
                        setCarCosts({
                            enabled: cc.enabled || false,
                            distancia: cc.distancia !== undefined ? cc.distancia : "",
                            consum: cc.consum !== undefined ? cc.consum : "6.5",
                            preuLitre: cc.preuLitre !== undefined ? cc.preuLitre : "1.40",
                            propuesta: cc.proposta !== undefined ? cc.proposta : ""
                        });
                    }
                    setIsLoading(false);
                });
                return () => unsub();
            }, [user, selectedBolo?.id]);

            const syncBoloData = async (updates) => {
                if (!user || !selectedBolo) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', selectedBolo.id);
                const boloRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id);
                
                const finalAtt = updates.attendance || attendance;
                const finalAss = updates.assignments || assignments;
                const finalSettings = updates.boloSettings || boloSettings;
                const finalCarCosts = updates.carCosts || carCosts;

                let finalCarData = updates.carData || carData;
                const validPeopleForCars = members.filter(p => finalAss
