<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukats - Gestió de Batucada</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #DCF23A; margin: 0; padding: 0; }
        
        .custom-scrollbar { -webkit-overflow-scrolling: touch; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .person-selected {
            outline: 3px solid #16a34a;
            outline-offset: 2px;
            background-color: white !important;
            z-index: 10;
        }

        .btn-3d-raised {
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.2);
            transform: translateY(-2px);
            transition: all 0.1s ease;
        }
        .btn-3d-pushed {
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.2);
            transform: translateY(2px);
            background-color: rgba(0,0,0,0.05);
        }

        .date-tab {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.15);
        }

        html, body, #root {
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .overflow-y-auto, .overflow-x-auto {
            -webkit-overflow-scrolling: touch;
        }

        .clickable-title {
            transition: all 0.2s;
        }
        .clickable-title:hover {
            filter: brightness(0.9);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, deleteDoc, addDoc, query } from "firebase/firestore";

        const { useState, useEffect, useMemo } = React;

        const productionConfig = {
            apiKey: "AIzaSyAbqfNeh1p-jGp0vGl6K85N-SJSi7DPwn0",
            authDomain: "tukatsbolos.firebaseapp.com",
            projectId: "tukatsbolos",
            storageBucket: "tukatsbolos.firebasestorage.app",
            messagingSenderId: "74618830888",
            appId: "1:74618830888:web:a8e08918d802ab1498751d"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : productionConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tukats-batucada-v1';

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                'log-out': <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
                'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                hourglass: <><path d="M5 2h14M5 22h14M15 2v5l-3 3-3-3V2M9 22v-5l3-3 3 3v5"/></>,
                key: <><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.778-7.778Zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3-3.5 3.5Z"/></>,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                car: <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></>,
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const ALL_PEOPLE = ["Jesus", "Merche", "Txis", "Josep", "Nacho", "Mon", "Claudia", "Toñi", "Alba", "Viñet", "Evelyn", "Dahna", "DavidB", "David", "Xavi", "Johny", "Valentin", "JosepA", "Merce", "Lorena", "Bruna", "Emily", "Valentina", "Carmen", "Maria", "Marta", "Paula", "Ona", "Aina", "Lluis", "Ernest"].sort();
        const INSTRUMENTS = ["1a", "2a", "3a", "Caixa", "Timba", "Xapa", "Tamborin", "Repe"];
        const MESOS = ["Gener", "Febrer", "Març", "Abril", "Maig", "Juny", "Juliol", "Agost", "Setembre", "Octubre", "Novembre", "Desembre"];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [bolos, setBolos] = useState([]);
            const [selectedBolo, setSelectedBolo] = useState(null);
            const [activeTab, setActiveTab] = useState('instruments');
            
            const [attendance, setAttendance] = useState({});
            const [assignments, setAssignments] = useState({});
            const [carData, setCarData] = useState(Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })));
            const [foodData, setFoodData] = useState({ standard: [], vegan: [], glutenFree: [], glutenFreeVegan: [] });
            const [boloSettings, setBoloSettings] = useState({ carsEnabled: false, foodEnabled: false });
            const [carCosts, setCarCosts] = useState({ enabled: false, distancia: "", consum: "6.5", preuLitre: "1.40", proposta: "" });
            
            const [settings, setSettings] = useState({ userPass: "TUKATS", adminPass: "ADMIN" });
            const [isLoading, setIsLoading] = useState(true);
            const [personToMove, setPersonToMove] = useState(null);

            const [showBoloModal, setShowBoloModal] = useState(false);
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [editingBoloData, setEditingBoloData] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(async () => {
                            await signInAnonymously(auth);
                        });
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), snap => {
                    if (snap.exists()) setSettings(snap.data());
                });
                const unsubBolos = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bolos'), snap => {
                    const bolosList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBolos(bolosList);
                    if (selectedBolo) {
                        const updated = bolosList.find(d => d.id === selectedBolo.id);
                        if (updated) setSelectedBolo(updated);
                    }
                });
                return () => { unsubSettings(); unsubBolos(); };
            }, [user, selectedBolo?.id]);

            useEffect(() => {
                if (!user || !selectedBolo) return;
                setIsLoading(true);
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', selectedBolo.id), snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setAttendance(d.attendance || {});
                        setAssignments(d.assignments || {});
                        setCarData(d.carData || Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })));
                        const fd = d.foodData || {};
                        setFoodData({
                            standard: fd.standard || [], vegan: fd.vegan || [],
                            glutenFree: fd.glutenFree || [], glutenFreeVegan: fd.glutenFreeVegan || []
                        });
                        setBoloSettings(d.boloSettings || { carsEnabled: false, foodEnabled: false });
                        const cc = d.carCosts || {};
                        setCarCosts({
                            enabled: cc.enabled || false,
                            distancia: cc.distancia !== undefined ? cc.distancia : "",
                            consum: cc.consum !== undefined ? cc.consum : "6.5",
                            preuLitre: cc.preuLitre !== undefined ? cc.preuLitre : "1.40",
                            proposta: cc.proposta !== undefined ? cc.proposta : ""
                        });
                    }
                    setIsLoading(false);
                });
                return () => unsub();
            }, [user, selectedBolo?.id]);

            const syncBoloData = async (updates) => {
                if (!user || !selectedBolo) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', selectedBolo.id);
                const boloRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id);
                
                const finalAtt = updates.attendance || attendance;
                const finalAss = updates.assignments || assignments;
                const finalSettings = updates.boloSettings || boloSettings;
                const finalCarCosts = updates.carCosts || carCosts;

                let finalCarData = updates.carData || carData;
                const validPeopleForCars = ALL_PEOPLE.filter(p => finalAss[p] !== null && finalAss[p] !== undefined || finalAtt[p] === 'blue');
                
                finalCarData = finalCarData.map(car => ({
                    ...car,
                    driver: validPeopleForCars.includes(car.driver) ? car.driver : null,
                    passengers: car.passengers.filter(p => validPeopleForCars.includes(p))
                }));

                const counts = {
                    memberCount: Object.values(finalAss).filter(v => v !== null).length,
                    declinedCount: Object.values(finalAtt).filter(v => v === 'red').length,
                    watchingCount: Object.values(finalAtt).filter(v => v === 'blue').length,
                };
                counts.pendingCount = ALL_PEOPLE.length - counts.memberCount - counts.declinedCount - counts.watchingCount;

                try {
                    await updateDoc(docRef, { 
                        attendance: finalAtt, assignments: finalAss,
                        carData: finalCarData, foodData: updates.foodData || foodData,
                        boloSettings: finalSettings, carCosts: finalCarCosts
                    });
                    await updateDoc(boloRef, { ...counts, carsEnabled: !!finalSettings.carsEnabled, foodEnabled: !!finalSettings.foodEnabled });
                } catch (e) { console.error(e); }
            };

            const getBoloDateTime = (b) => {
                if (!b.fecha) return new Date(0);
                const [y, m, d] = b.fecha.split('-').map(Number);
                const [hh, mm] = (b.hora || "00:00").split(':').map(Number);
                return new Date(y, m - 1, d, hh, mm);
            };

            const esPasado = (b) => getBoloDateTime(b) < new Date();

            const getFormattedDateBadge = (fechaStr) => {
                if (!fechaStr) return { day: "?", month: "?" };
                const [y, m, d] = fechaStr.split('-').map(Number);
                return { day: d, month: MESOS[m - 1] };
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const target = isAdminMode ? settings.adminPass : settings.userPass;
                if (passwordInput === target) {
                    setIsLoggedIn(true);
                    setIsAdminAuth(isAdminMode);
                    setPasswordInput("");
                }
            };

            const handleDeleteBolo = async (id, e) => {
                e.stopPropagation();
                if (!confirm("Segur que vols eliminar aquest bolo?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', id));
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', id));
                } catch (err) { console.error(err); }
            };

            const handleSaveBolo = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = { nombre: formData.get('nombre'), fecha: formData.get('fecha'), hora: formData.get('hora'), duracion: formData.get('duracion'), lugar: formData.get('lugar') };
                try {
                    if (editingBoloData) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', editingBoloData.id), data);
                    } else {
                        const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bolos'), {
                            ...data, memberCount: 0, pendingCount: ALL_PEOPLE.length, declinedCount: 0, watchingCount: 0,
                            info: "", carsEnabled: false, foodEnabled: false, precio: 0
                        });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', docRef.id), {
                            attendance: {}, assignments: {}, 
                            carData: Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })),
                            foodData: { standard: [], vegan: [], glutenFree: [], glutenFreeVegan: [] },
                            boloSettings: { carsEnabled: false, foodEnabled: false },
                            carCosts: { enabled: false, distancia: "", consum: "6.5", preuLitre: "1.40", proposta: "" }
                        });
                    }
                    setShowBoloModal(false);
                    setEditingBoloData(null);
                } catch (err) { console.error(err); }
            };

            const handleUpdatePasswords = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), {
                        userPass: formData.get('userPass'), adminPass: formData.get('adminPass')
                    });
                    setShowConfigModal(false);
                } catch (err) { console.error(err); }
            };

            const availablePeople = useMemo(() => {
                return ALL_PEOPLE.filter(p => (assignments[p] && assignments[p] !== null) || attendance[p] === 'blue');
            }, [attendance, assignments]);

            const movePersonToCategory = (target) => {
                if (!personToMove) return;
                let newAtt = { ...attendance };
                let newAss = { ...assignments };
                if (target === 'pending') { delete newAtt[personToMove]; newAss[personToMove] = null; }
                else if (target === 'blue') { newAtt[personToMove] = 'blue'; newAss[personToMove] = null; }
                else if (target === 'red') { newAtt[personToMove] = 'red'; newAss[personToMove] = null; }
                else { newAtt[personToMove] = 'green'; newAss[personToMove] = target; }
                syncBoloData({ attendance: newAtt, assignments: newAss });
                setPersonToMove(null);
            };

            const renderInstrumentsTab = () => (
                <div className="flex-1 flex flex-row overflow-hidden">
                    <aside className="w-[110px] md:w-80 bg-white/20 border-r-2 border-white/30 p-2 flex flex-col shrink-0 overflow-y-auto custom-scrollbar">
                        <div className="flex flex-col min-h-0 mb-4">
                            <h3 onClick={() => movePersonToCategory('pending')} className={`text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center tracking-[0.1em] text-orange-700 bg-orange-100/50 py-1 rounded-lg italic shrink-0 ${personToMove ? 'clickable-title cursor-pointer' : ''}`}>Pendents</h3>
                            <div className="flex flex-col gap-1.5">{ALL_PEOPLE.filter(p => !assignments[p] && !['red', 'blue'].includes(attendance[p])).map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)} className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-white/40 shadow-sm ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}</div>
                        </div>
                        <div className="flex flex-col min-h-0 mb-4">
                            <h3 onClick={() => movePersonToCategory('blue')} className={`text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center tracking-[0.1em] text-blue-700 bg-blue-100/50 py-1 rounded-lg italic shrink-0 ${personToMove ? 'clickable-title cursor-pointer' : ''}`}>Mirar</h3>
                            <div className="flex flex-col gap-1.5">{ALL_PEOPLE.filter(p => attendance[p] === 'blue').map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)} className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-blue-100 text-blue-700 shadow-sm ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}</div>
                        </div>
                        <div className="flex flex-col min-h-0 mb-4">
                            <h3 onClick={() => movePersonToCategory('red')} className={`text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center tracking-[0.1em] text-red-700 bg-red-100/50 py-1 rounded-lg italic shrink-0 ${personToMove ? 'clickable-title cursor-pointer' : ''}`}>No Puc</h3>
                            <div className="flex flex-col gap-1.5">{ALL_PEOPLE.filter(p => attendance[p] === 'red').map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)} className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-red-100 text-red-700 shadow-sm ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}</div>
                        </div>
                    </aside>
                    <main className="flex-1 p-2 md:p-4 grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4 overflow-y-auto custom-scrollbar content-start pb-4">
                        {INSTRUMENTS.map(inst => (
                            <div key={inst} onDragOver={e=>e.preventDefault()} onDrop={e => {
                                const p = e.dataTransfer.getData("p");
                                syncBoloData({ assignments: { ...assignments, [p]: inst }, attendance: { ...attendance, [p]: 'green' } });
                            }} onClick={() => movePersonToCategory(inst)}
                                className={`bg-white/40 rounded-xl md:rounded-[2rem] p-2 md:p-4 border border-white/40 shadow-inner min-h-[120px] transition-all ${personToMove ? 'cursor-pointer hover:bg-green-100/40' : ''}`}>
                                <h3 className="text-[14px] md:text-[16px] font-black uppercase mb-1 border-b-2 border-green-900/10 italic">{inst}</h3>
                                <div className="flex-wrap gap-1 flex">
                                    {ALL_PEOPLE.filter(p => assignments[p] === inst).map(p => (
                                        <span key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={(e) => { e.stopPropagation(); setPersonToMove(personToMove === p ? null : p); }}
                                            className={`text-[12px] md:text-[24px] font-black text-green-700 cursor-grab ${personToMove === p ? 'person-selected' : ''}`}>{p}</span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );

            const renderInfoTab = () => (
                <div className="flex-1 p-4 md:p-8 flex flex-col overflow-hidden">
                    <h3 className="text-2xl font-black uppercase italic mb-4">Informació Extra</h3>
                    {isAdminAuth && (
                        <div className="mb-6 bg-white/50 p-4 rounded-3xl border-2 border-dashed border-green-600/30">
                            <label className="block text-xs font-black uppercase opacity-60 mb-2">VALOR DEL BOLO (€) - Només Admin</label>
                            <div className="flex items-center gap-4">
                                <input 
                                    type="number" 
                                    className="flex-1 p-4 bg-white rounded-2xl font-black text-2xl text-green-700 outline-none focus:ring-2 ring-green-500 shadow-inner"
                                    defaultValue={selectedBolo.precio || 0}
                                    onBlur={async (e) => {
                                        const newVal = parseInt(e.target.value) || 0;
                                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id), { precio: newVal });
                                    }}
                                />
                                <span className="text-2xl font-black text-green-900">€</span>
                            </div>
                        </div>
                    )}
                    {isAdminAuth ? (
                        <textarea className="flex-1 w-full p-6 bg-white/70 rounded-3xl border-2 border-transparent focus:border-blue-500 outline-none font-bold text-lg md:text-xl resize-none shadow-xl mb-64"
                            placeholder="Afegeix aquí informació sobre el bolo..."
                            defaultValue={selectedBolo.info}
                            onBlur={async (e) => {
                                const newVal = e.target.value;
                                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id), { info: newVal });
                                setSelectedBolo({...selectedBolo, info: newVal});
                            }} />
                    ) : (
                        <div className="flex-1 p-6 bg-white/70 rounded-3xl font-bold text-lg md:text-xl whitespace-pre-wrap shadow-xl overflow-y-auto custom-scrollbar pb-64">
                            {selectedBolo.info || "No hi ha informació addicional disponible."}
                        </div>
                    )}
                </div>
            );

            const renderCarCostsTable = () => {
                if (!isAdminAuth && !carCosts.enabled) return null;
                const distNum = Number(carCosts.distancia) || 0;
                const consNum = Number(carCosts.consum) || 0;
                const preuNum = Number(carCosts.preuLitre) || 0;
                const propNum = Number(carCosts.proposta) || 0;
                const distTot = distNum * 2;
                const costGasCotxe = Math.floor((consNum * preuNum / 100) * distTot);
                const totalCotxesNum = carData.filter(c => c.driver).length;
                const totalMembresNum = carData.reduce((acc, c) => acc + (c.driver ? 1 : 0) + c.passengers.length, 0);
                const totalCostCotxesNum = costGasCotxe * totalCotxesNum;
                const totalAportatNum = propNum * totalMembresNum;
                const aportacioBatucadaNum = totalCostCotxesNum - totalAportatNum;

                return (
                    <div className="mt-8 bg-white/60 p-4 md:p-6 rounded-3xl shadow-md border border-white/40">
                        <div className="flex justify-between items-center mb-5">
                            <h3 className="text-lg md:text-xl font-black uppercase italic text-amber-900">Costos de Desplaçament</h3>
                            {isAdminAuth && (
                                <button onClick={() => syncBoloData({ carCosts: { ...carCosts, enabled: !carCosts.enabled } })} className={`px-3 py-1.5 rounded-lg font-black text-xs uppercase ${carCosts.enabled ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                                    {carCosts.enabled ? 'ON' : 'OFF'}
                                </button>
                            )}
                        </div>
                        <div className="space-y-2 text-[13px] md:text-sm font-bold text-amber-950/80">
                            <div className="flex justify-between items-center bg-white/50 p-2.5 rounded-xl">
                                <span>Distància BOLO Gelida-Destí:</span>
                                <div className="flex items-center gap-1.5">
                                    {isAdminAuth ? <input type="number" value={carCosts.distancia} onChange={e => syncBoloData({ carCosts: { ...carCosts, distancia: e.target.value } })} className="w-16 md:w-20 p-1.5 text-right bg-white rounded-lg border border-amber-200 font-black" /> : <span className="font-black text-amber-900">{carCosts.distancia}</span>}
                                    <span className="font-black">Kms</span>
                                </div>
                            </div>
                            <div className="flex justify-between items-center bg-white/40 p-2.5 rounded-xl opacity-80">
                                <span>Anada i Tornada:</span>
                                <span className="font-black text-amber-900">{distTot} Kms</span>
                            </div>
                            <div className="flex justify-between items-center bg-white/50 p-2.5 rounded-xl">
                                <span>Consum mig (l/100):</span>
                                {isAdminAuth ? <input type="number" step="0.1" value={carCosts.consum} onChange={e => syncBoloData({ carCosts: { ...carCosts, consum: e.target.value } })} className="w-16 md:w-20 p-1.5 text-right bg-white rounded-lg border border-amber-200 font-black" /> : <span className="font-black text-amber-900">{carCosts.consum}</span>}
                            </div>
                            <div className="flex justify-between items-center bg-white/50 p-2.5 rounded-xl">
                                <span>Preu litre (€):</span>
                                {isAdminAuth ? <input type="number" step="0.01" value={carCosts.preuLitre} onChange={e => syncBoloData({ carCosts: { ...carCosts, preuLitre: e.target.value } })} className="w-16 md:w-20 p-1.5 text-right bg-white rounded-lg border border-amber-200 font-black" /> : <span className="font-black text-amber-900">{preuNum.toFixed(2)}</span>}
                            </div>
                            <div className="flex justify-between items-center bg-amber-200/50 p-3 rounded-xl font-black text-amber-900 border border-amber-300">
                                <span>Cost Gasolina / cotxe:</span>
                                <span>{costGasCotxe} €</span>
                            </div>
                            <div className="grid grid-cols-2 gap-2 my-2">
                                <div className="bg-white/50 p-2.5 rounded-xl text-center">
                                    <div className="text-[10px] opacity-50 uppercase">Cotxes</div>
                                    <div className="font-black">{totalCotxesNum}</div>
                                </div>
                                <div className="bg-white/50 p-2.5 rounded-xl text-center">
                                    <div className="text-[10px] opacity-50 uppercase">Membres</div>
                                    <div className="font-black">{totalMembresNum}</div>
                                </div>
                            </div>
                            <div className="flex justify-between items-center bg-amber-200/50 p-3 rounded-xl font-black text-amber-900 border border-amber-300 shadow-sm">
                                <span>PROPOSTA per membre:</span>
                                <div className="flex items-center gap-1.5">
                                    {isAdminAuth ? <input type="number" step="0.5" value={carCosts.proposta} onChange={e => syncBoloData({ carCosts: { ...carCosts, proposta: e.target.value } })} className="w-16 md:w-20 p-1.5 text-right bg-white rounded-lg border border-amber-400 font-black" /> : <span className="font-black text-amber-900">{propNum.toFixed(1)}</span>}
                                    <span className="font-black">€</span>
                                </div>
                            </div>
                            <div className="flex justify-between items-center bg-blue-50/70 p-3 rounded-xl font-black text-blue-900 border border-blue-200">
                                <span>Total aportat membres:</span>
                                <span>{totalAportatNum.toFixed(1)} €</span>
                            </div>
                            <div className="flex justify-between items-center bg-red-50/70 p-3 rounded-xl font-black text-red-900 border border-red-200">
                                <span>Total cost cotxes:</span>
                                <span>{totalCostCotxesNum.toFixed(1)} €</span>
                            </div>
                            <div className="flex justify-between items-center bg-green-100/70 p-3.5 rounded-xl font-black text-green-900 border border-green-300 shadow-sm">
                                <span>Aportació Batucada:</span>
                                <span>{aportacioBatucadaNum.toFixed(1)} €</span>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBoloCard = (b) => {
                const hasInfo = b.info && b.info.trim().length > 0;
                const pasado = esPasado(b);
                const { day, month } = getFormattedDateBadge(b.fecha);
                const precio = b.precio || 0;

                return (
                    <div key={b.id} onClick={() => { setSelectedBolo(b); setActiveTab('instruments'); }} 
                         className={`p-4 bg-white/70 rounded-3xl flex flex-col gap-2 shadow-md hover:border-green-500 border-2 border-transparent transition-all cursor-pointer relative group mt-4 mb-2 ${pasado ? 'opacity-50 grayscale-[20%]' : ''}`}>
                        <div className={`absolute -top-4 right-0 md:-right-2 w-14 h-14 md:w-16 md:h-16 rounded-xl flex flex-col items-center justify-center date-tab z-20 ${pasado ? 'bg-gray-500 text-white' : 'bg-[#DCF23A] text-black border border-black/5'}`}>
                            <span className="text-lg md:text-xl font-black leading-none">{day}</span>
                            <span className="text-[9px] md:text-[10px] font-black uppercase tracking-tight leading-none mt-1 opacity-90">{month}</span>
                        </div>
                        {precio > 0 && (
                            <div className={`absolute top-12 md:top-14 right-0 md:-right-2 w-14 h-7 md:w-16 md:h-8 rounded-xl flex items-center justify-center date-tab z-20 ${pasado ? 'bg-gray-400 text-white' : 'bg-[#DCF23A] text-black border border-black/5'}`}>
                                <span className="text-[12px] md:text-[14px] font-black italic">{precio}€</span>
                            </div>
                        )}
                        {isAdminAuth && (
                            <div className="absolute -bottom-2 -left-2 flex gap-1 z-30">
                                <button onClick={(e) => { e.stopPropagation(); setEditingBoloData(b); setShowBoloModal(true); }} className="p-2 bg-blue-100 text-blue-600 rounded-lg shadow-sm">
                                    <Icon name="edit" size={14}/>
                                </button>
                                <button onClick={(e) => handleDeleteBolo(b.id, e)} className="p-2 bg-red-100 text-red-600 rounded-lg shadow-sm">
                                    <Icon name="trash" size={14}/>
                                </button>
                            </div>
                        )}
                        <h4 className="text-2xl font-black italic text-green-900 leading-none mb-0.5 pr-14 md:pr-20">{b.nombre}</h4>
                        <div className="flex flex-col gap-0.5 text-[15px] font-black opacity-70 tracking-normal">
                            <div className="flex flex-wrap gap-x-4 gap-y-0.5 leading-tight">
                                <span className="flex items-center gap-1 uppercase"><Icon name="clock" size={15}/> {b.hora}</span>
                                {b.duracion && <span className="flex items-center gap-1"><Icon name="hourglass" size={15}/> {b.duracion}</span>}
                            </div>
                            <span className="flex items-center gap-1 leading-tight uppercase"><Icon name="map-pin" size={15}/> {b.lugar}</span>
                        </div>
                        <div className="flex flex-col gap-1 mt-1">
                            <div className="flex gap-1 w-full">
                                <div className="flex-1 bg-green-100 text-green-800 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase">{b.memberCount || 0} OK</div>
                                <div className="flex-1 bg-orange-100 text-orange-800 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase">{b.pendingCount || 0} ?</div>
                                <div className="flex-1 bg-red-100 text-red-800 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase">{b.declinedCount || 0} NO</div>
                                <div className="flex-1 bg-blue-100 text-blue-800 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase flex items-center justify-center gap-1"><Icon name="eye" size={15}/> {b.watchingCount || 0}</div>
                            </div>
                            <div className="flex gap-1 w-full">
                                <div className={`flex-1 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase flex items-center justify-center gap-1 transition-all ${hasInfo ? 'bg-blue-600 text-white shadow-md' : 'bg-blue-600/5 text-blue-900/10'}`}><Icon name="info" size={15}/> INFO</div>
                                <div className={`flex-1 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase flex items-center justify-center gap-1 transition-all ${b.carsEnabled ? 'bg-amber-800 text-white shadow-md' : 'bg-amber-800/5 text-amber-900/10'}`}><Icon name="car" size={15}/> COTXES</div>
                                <div className={`flex-1 p-1 md:p-1.5 rounded-xl text-center font-black text-[13px] uppercase flex items-center justify-center gap-1 transition-all ${b.foodEnabled ? 'bg-purple-600 text-white shadow-md' : 'bg-purple-600/5 text-purple-900/10'}`}><Icon name="utensils" size={15}/> MENJAR</div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderCarsTab = () => (
                <div className="flex-1 flex flex-row overflow-hidden">
                    <aside 
                        onClick={() => {
                            if (personToMove) {
                                const newData = carData.map(c => ({...c, driver: c.driver === personToMove ? null : c.driver, passengers: c.passengers.filter(pass => pass !== personToMove)}));
                                syncBoloData({ carData: newData });
                                setPersonToMove(null);
                            }
                        }}
                        className={`w-[110px] md:w-80 bg-white/20 border-r-2 border-white/30 p-2 flex flex-col shrink-0 overflow-hidden ${personToMove ? 'cursor-pointer hover:bg-green-100/30' : ''}`}
                    >
                        <h3 className="text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center bg-green-100/50 py-1 rounded-lg italic shrink-0 text-green-800">
                            {personToMove ? 'Tornar Aquí' : 'OK / Mirar'}
                        </h3>
                        <div className="flex flex-col gap-1.5 overflow-y-auto custom-scrollbar pb-64">
                            {availablePeople.filter(p => !carData.some(c => c.driver === p || c.passengers.includes(p))).map(p => (
                                <div key={p} 
                                    onClick={(e) => { e.stopPropagation(); setPersonToMove(personToMove === p ? null : p); }}
                                    className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-pointer bg-white/40 hover:bg-white shadow-sm shrink-0 ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}
                        </div>
                    </aside>
                    <main className="flex-1 p-2 md:p-4 overflow-y-auto custom-scrollbar pb-64">
                        <div className="flex items-center justify-between mb-4 bg-white/40 p-3 rounded-2xl">
                            <h3 className="text-xl font-black uppercase italic text-amber-900">Gestió de Cotxes</h3>
                            {isAdminAuth && (
                                <button onClick={() => syncBoloData({ boloSettings: { ...boloSettings, carsEnabled: !boloSettings.carsEnabled } })}
                                    className={`px-4 py-2 rounded-xl font-black text-xs uppercase shadow-sm ${boloSettings.carsEnabled ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                                    COTXES: {boloSettings.carsEnabled ? 'SI' : 'NO'}
                                </button>
                            )}
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {carData.map((car, idx) => (
                                <div key={car.id} className="bg-white/60 p-4 rounded-3xl shadow-md border border-white/40">
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="flex items-center gap-2 font-black uppercase italic text-sm text-amber-900"><Icon name="car" size={18}/> COTXE {car.id}</div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-[10px] font-black opacity-40">PLACES:</span>
                                            {isAdminAuth ? (
                                                <input type="number" min="1" max="9" className="w-10 bg-white rounded-lg text-center font-black border" value={car.capacity} 
                                                    onChange={(e) => {
                                                        const newData = [...carData];
                                                        newData[idx].capacity = parseInt(e.target.value) || 1;
                                                        syncBoloData({ carData: newData });
                                                    }} />
                                            ) : (
                                                <span className="font-black text-amber-900 px-2">{car.capacity}</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <div className="text-[9px] font-black uppercase opacity-50">Conductor:</div>
                                            <div 
                                                onClick={() => {
                                                    if (personToMove) {
                                                        // Move personToMove here
                                                        const newData = carData.map(c => ({...c, driver: c.driver === personToMove ? null : c.driver, passengers: c.passengers.filter(pass => pass !== personToMove)}));
                                                        newData[idx].driver = personToMove;
                                                        syncBoloData({ carData: newData });
                                                        setPersonToMove(null);
                                                    } else if (car.driver) {
                                                        // Select current driver
                                                        setPersonToMove(car.driver);
                                                    }
                                                }}
                                                className={`min-h-[40px] bg-white/80 rounded-xl p-2 border-2 border-dashed flex items-center justify-center font-black text-amber-900 text-sm cursor-pointer transition-colors ${personToMove ? 'border-green-400 bg-green-50' : 'border-amber-200 hover:bg-white'}`}>
                                                {car.driver || "BUIT"}
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <div className="text-[9px] font-black uppercase opacity-50">Passatgers:</div>
                                            <div 
                                                onClick={() => {
                                                    if (personToMove) {
                                                        if (car.passengers.length >= car.capacity - 1 || car.driver === personToMove) return;
                                                        const newData = carData.map(c => ({...c, driver: c.driver === personToMove ? null : c.driver, passengers: c.passengers.filter(pass => pass !== personToMove)}));
                                                        newData[idx].passengers.push(personToMove);
                                                        syncBoloData({ carData: newData });
                                                        setPersonToMove(null);
                                                    }
                                                }}
                                                className={`min-h-[40px] bg-white/80 rounded-xl p-2 border-2 border-dashed flex flex-wrap gap-1 font-black text-xs text-amber-800/70 cursor-pointer transition-colors ${personToMove ? 'border-green-300 bg-green-50' : 'border-amber-100'}`}>
                                                {car.passengers.map(p => (
                                                    <span key={p} 
                                                        onClick={(e) => {
                                                            if (!personToMove) {
                                                                e.stopPropagation();
                                                                setPersonToMove(p);
                                                            }
                                                        }}
                                                        className={`bg-amber-50 px-1 rounded cursor-pointer hover:bg-green-100 transition-colors ${personToMove === p ? 'ring-2 ring-green-600' : ''}`}
                                                    >
                                                        {p}
                                                    </span>
                                                ))}
                                                {car.passengers.length === 0 && car.capacity > 1 && !personToMove && <span className="opacity-30">BUIT</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {renderCarCostsTable()}
                    </main>
                </div>
            );

            const renderFoodTab = () => (
                <div className="flex-1 flex flex-row overflow-hidden">
                    <aside className="w-[110px] md:w-80 bg-white/20 border-r-2 border-white/30 p-2 flex flex-col shrink-0 overflow-hidden">
                        <h3 className="text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center bg-gray-100/50 py-1 rounded-lg italic shrink-0">Lliures</h3>
                        <div className="flex flex-col gap-1.5 overflow-y-auto custom-scrollbar pb-64">
                            {availablePeople.filter(p => !foodData.standard.includes(p) && !foodData.vegan.includes(p) && !foodData.glutenFree.includes(p) && !foodData.glutenFreeVegan.includes(p)).map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)}
                                    className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-white/40 hover:bg-white shadow-sm shrink-0 ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}
                        </div>
                    </aside>
                    <main className="flex-1 p-2 md:p-4 overflow-y-auto custom-scrollbar pb-64">
                        <div className="flex items-center justify-between mb-4 bg-white/40 p-3 rounded-2xl">
                            <h3 className="text-xl font-black uppercase italic text-purple-900">Gestió de Menjar</h3>
                            {isAdminAuth && (
                                <button onClick={() => syncBoloData({ boloSettings: { ...boloSettings, foodEnabled: !boloSettings.foodEnabled } })}
                                    className={`px-4 py-2 rounded-xl font-black text-xs uppercase shadow-sm ${boloSettings.foodEnabled ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                                    MENJAR: {boloSettings.foodEnabled ? 'SI' : 'NO'}
                                </button>
                            )}
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {[
                                { id: 'standard', label: 'MENJAR ESTÀNDARD', color: 'purple' },
                                { id: 'vegan', label: 'VEGÀ / VEGETARIÀ', color: 'green' },
                                { id: 'glutenFree', label: 'SENSE GLUTEN', color: 'blue' },
                                { id: 'glutenFreeVegan', label: 'SENSE GLUTEN i VEGÀ', color: 'teal' }
                            ].map(group => (
                                <div key={group.id} onDragOver={e=>e.preventDefault()} onDrop={e => {
                                    const p = e.dataTransfer.getData("p");
                                    const newFD = { ...foodData };
                                    Object.keys(newFD).forEach(k => newFD[k] = (newFD[k] || []).filter(x => x !== p));
                                    newFD[group.id].push(p);
                                    syncBoloData({ foodData: newFD });
                                }} onClick={() => {
                                    if (!personToMove) return;
                                    const newFD = { ...foodData };
                                    Object.keys(newFD).forEach(k => newFD[k] = (newFD[k] || []).filter(x => x !== personToMove));
                                    newFD[group.id].push(personToMove);
                                    syncBoloData({ foodData: newFD });
                                    setPersonToMove(null);
                                }}
                                className={`bg-white/60 p-6 rounded-3xl shadow-md border border-white/40 min-h-[160px] ${personToMove ? 'cursor-pointer hover:bg-purple-100/40' : ''}`}>
                                    <h4 className={`font-black uppercase italic mb-4 flex items-center gap-2 text-${group.color}-800`}><Icon name="utensils" size={18}/> {group.label}</h4>
                                    <div className="flex flex-wrap gap-2">
                                        {(foodData[group.id] || []).map(p => (
                                            <span key={p} onClick={(e) => { e.stopPropagation(); syncBoloData({ foodData: { ...foodData, [group.id]: foodData[group.id].filter(x => x !== p) } }); }}
                                                className={`bg-${group.color}-100 text-${group.color}-900 px-3 py-1 rounded-full font-black text-sm md:text-xl cursor-pointer hover:bg-red-100`}>{p}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );

            if (!isLoggedIn) return (
                <div className="h-screen w-screen flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-sm border-t-[10px] border-green-600">
                        <h1 className="text-4xl font-black text-center mb-8 text-green-900 uppercase tracking-tighter italic">Tukats Login</h1>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div className="flex items-center space-x-3 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <input type="checkbox" id="adm" checked={isAdminMode} onChange={e => setIsAdminMode(e.target.checked)} className="w-6 h-6 accent-green-600 cursor-pointer" />
                                <label htmlFor="adm" className="text-sm font-black text-gray-700 cursor-pointer select-none uppercase tracking-tight">Mode Administrador</label>
                            </div>
                            <input type="password" placeholder="Contrasenya" className="w-full p-5 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 outline-none text-xl font-bold" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} required />
                            <button type="submit" className="w-full bg-green-600 text-white font-black py-5 rounded-2xl hover:bg-green-700 shadow-xl uppercase tracking-widest text-lg">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            if (!selectedBolo) {
                const sortedBolos = [...bolos].sort((a, b) => getBoloDateTime(a) - getBoloDateTime(b));
                const futureBolos = sortedBolos.filter(b => !esPasado(b));
                const pastBolos = sortedBolos.filter(b => esPasado(b)).reverse();

                return (
                    <div className="h-screen w-screen flex flex-col overflow-hidden text-green-950">
                        <header className="px-3 py-3 md:px-6 md:py-4 bg-white/20 backdrop-blur-md flex justify-between items-center shrink-0 border-b border-white/20">
                            <div className="flex items-center gap-2 md:gap-3 shrink-0">
                                <h2 className="text-[18px] sm:text-xl md:text-2xl font-black italic tracking-tighter uppercase leading-none">TUKATS - BOLOS</h2>
                            </div>
                            <div className="flex gap-2">
                                {isAdminAuth && <button onClick={() => setShowConfigModal(true)} className="p-2 md:p-3 bg-white/50 text-blue-900 rounded-xl shadow-sm"><Icon name="settings" size={20}/></button>}
                                <button onClick={() => setIsLoggedIn(false)} className="bg-red-600 text-white px-3 py-2 rounded-xl font-black flex items-center gap-1.5 shadow-md text-xs shrink-0"><Icon name="log-out" size={14}/> <span className="hidden sm:inline">Sortir</span></button>
                            </div>
                        </header>
                        <main className="flex-1 p-2 md:p-8 flex flex-col items-center overflow-hidden">
                            <div className="w-full max-w-5xl bg-white/40 rounded-[2rem] md:rounded-[3rem] p-2 md:p-8 flex flex-col overflow-hidden shadow-2xl border border-white/40">
                                {isAdminAuth && (
                                    <div className="mb-6 flex justify-end px-2">
                                        <button onClick={() => { setEditingBoloData(null); setShowBoloModal(true); }} className="bg-green-600 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 hover:bg-green-700 uppercase tracking-tighter shadow-lg shadow-green-600/20 active:scale-95"><Icon name="plus" size={18}/> Nou Bolo</button>
                                    </div>
                                )}
                                <div className="flex-1 overflow-y-auto pr-1 md:pr-3 custom-scrollbar space-y-8 pb-32">
                                    <section>
                                        <h3 className="text-2xl md:text-4xl font-black mb-4 uppercase border-b border-green-900/10 pb-2 italic tracking-tighter">Propers Bolos</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 px-2">{futureBolos.map(renderBoloCard)}</div>
                                    </section>
                                    <section>
                                        <h3 className="text-2xl md:text-4xl font-black mb-4 uppercase border-b border-green-900/10 pb-2 italic tracking-tighter opacity-40">Bolos Passats</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 px-2">{pastBolos.map(renderBoloCard)}</div>
                                    </section>
                                </div>
                            </div>
                        </main>
                        {showBoloModal && <BoloModal editingBoloData={editingBoloData} onSave={handleSaveBolo} onClose={() => setShowBoloModal(false)} />}
                        {showConfigModal && <ConfigModal settings={settings} onUpdate={handleUpdatePasswords} onClose={() => setShowConfigModal(false)} />}
                    </div>
                );
            }

            const confirmedCount = Object.values(assignments).filter(v => v !== null).length;
            const declinedCount = Object.values(attendance).filter(v => v === 'red').length;
            const watchingCount = Object.values(attendance).filter(v => v === 'blue').length;
            const pendingCount = ALL_PEOPLE.length - confirmedCount - declinedCount - watchingCount;

            const isInfoDisabled = !isAdminAuth && !selectedBolo.info;
            const isCarsDisabled = !isAdminAuth && !boloSettings.carsEnabled;
            const isFoodDisabled = !isAdminAuth && !boloSettings.foodEnabled;

            return (
                <div className="h-screen w-screen flex flex-col overflow-hidden text-green-950">
                    <header className="bg-white/30 backdrop-blur-md border-b border-white/20 px-3 py-3 md:px-6 md:py-4 shrink-0">
                        <h2 className="text-[22px] md:text-4xl font-black italic leading-none tracking-tighter mb-4">{selectedBolo?.nombre}</h2>
                        <div className="flex gap-2 md:gap-4 mb-4">
                            <button onClick={() => { setActiveTab('instruments'); setPersonToMove(null); }} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'instruments' ? 'btn-3d-pushed bg-green-500 text-white' : 'btn-3d-raised bg-white text-green-900'}`}>INSTRUMENTS</button>
                            <button onClick={() => !isInfoDisabled && setActiveTab('info')} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'info' ? 'btn-3d-pushed bg-blue-600 text-white' : 'btn-3d-raised bg-white text-blue-900'} ${isInfoDisabled ? 'opacity-30 pointer-events-none' : ''}`}>INFORMACIÓ</button>
                            <button onClick={() => !isCarsDisabled && setActiveTab('cars')} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'cars' ? 'btn-3d-pushed bg-amber-800 text-white' : 'btn-3d-raised bg-white text-amber-900'} ${isCarsDisabled ? 'opacity-30 pointer-events-none' : ''}`}>COTXES</button>
                            <button onClick={() => !isFoodDisabled && setActiveTab('food')} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'food' ? 'btn-3d-pushed bg-purple-600 text-white' : 'btn-3d-raised bg-white text-purple-900'} ${isFoodDisabled ? 'opacity-30 pointer-events-none' : ''}`}>MENJAR</button>
                        </div>
                        <div className="flex items-center justify-between w-full gap-2">
                            <div className="flex items-center bg-black/5 rounded-xl p-1.5 md:px-6 md:py-3 gap-1 md:gap-6 flex-1 justify-between">
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-green-700">{confirmedCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase opacity-50">OK</div>
                                </div>
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-orange-600">{pendingCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase opacity-50">?</div>
                                </div>
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-red-600">{declinedCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase opacity-50">NO</div>
                                </div>
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-blue-600">{watchingCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase flex items-center justify-center pt-0.5"><Icon name="eye" size={15}/></div>
                                </div>
                            </div>
                            <button onClick={() => { setSelectedBolo(null); setActiveTab('instruments'); setPersonToMove(null); }} className="bg-red-600 text-white px-4 py-2.5 rounded-xl font-black text-[14px] uppercase shadow-xl active:scale-95 shrink-0">Tornar</button>
                        </div>
                    </header>
                    {isLoading ? <div className="flex-1 flex items-center justify-center"><div className="w-16 h-16 border-4 border-green-600 border-t-transparent rounded-full loading-spin"></div></div> : (
                        <>
                            {activeTab === 'instruments' && renderInstrumentsTab()}
                            {activeTab === 'info' && renderInfoTab()}
                            {activeTab === 'cars' && renderCarsTab()}
                            {activeTab === 'food' && renderFoodTab()}
                        </>
                    )}
                </div>
            );
        }

        const BoloModal = ({ editingBoloData, onSave, onClose }) => (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8">
                    <h3 className="text-3xl font-black uppercase italic mb-6 text-green-900">{editingBoloData ? 'Editar' : 'Nou'} Bolo</h3>
                    <form onSubmit={onSave} className="space-y-4">
                        <input name="nombre" defaultValue={editingBoloData?.nombre} placeholder="Nom" className="w-full p-4 bg-gray-100 rounded-2xl font-bold" required />
                        <div className="grid grid-cols-2 gap-4">
                            <input name="fecha" type="date" defaultValue={editingBoloData?.fecha} className="p-4 bg-gray-100 rounded-2xl font-bold" required />
                            <input name="hora" type="time" defaultValue={editingBoloData?.hora} className="p-4 bg-gray-100 rounded-2xl font-bold" required />
                        </div>
                        <input name="lugar" defaultValue={editingBoloData?.lugar} placeholder="Lloc" className="w-full p-4 bg-gray-100 rounded-2xl font-bold" required />
                        <div className="flex gap-3 pt-4">
                            <button type="button" onClick={onClose} className="flex-1 py-4 bg-gray-200 text-gray-700 font-black rounded-2xl uppercase">Cancel·lar</button>
                            <button type="submit" className="flex-1 py-4 bg-green-600 text-white font-black rounded-2xl uppercase">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        );

        const ConfigModal = ({ settings, onUpdate, onClose }) => (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
                    <h3 className="text-3xl font-black uppercase italic mb-6 text-blue-900">Ajustos</h3>
                    <form onSubmit={onUpdate} className="space-y-4">
                        <input name="userPass" defaultValue={settings.userPass} placeholder="User Pass" className="w-full p-4 bg-gray-100 rounded-2xl font-bold" required />
                        <input name="adminPass" defaultValue={settings.adminPass} placeholder="Admin Pass" className="w-full p-4 bg-gray-100 rounded-2xl font-bold" required />
                        <div className="flex gap-3 pt-4">
                            <button type="button" onClick={onClose} className="flex-1 py-4 bg-gray-200 text-gray-700 font-black rounded-2xl uppercase">Tancar</button>
                            <button type="submit" className="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl uppercase">Actualitzar</button>
                        </div>
                    </form>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
