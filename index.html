<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukats - Gestió de Batucada</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #DCF23A; margin: 0; padding: 0; }
        
        .custom-scrollbar { -webkit-overflow-scrolling: touch; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        /* Alçada específica per mostrar aprox 3 persones */
        .person-list-container {
            max-height: 150px; /* Mòbil */
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            .person-list-container {
                max-height: 220px; /* Desktop */
            }
        }

        .person-selected {
            outline: 3px solid #16a34a;
            outline-offset: 2px;
            background-color: white !important;
            z-index: 10;
        }

        .btn-3d-raised {
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.2);
            transform: translateY(-2px);
            transition: all 0.1s ease;
        }
        .btn-3d-pushed {
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.2);
            transform: translateY(2px);
            background-color: rgba(0,0,0,0.05);
        }

        .date-tab {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.15);
        }

        html, body, #root {
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .clickable-title {
            transition: all 0.2s;
        }
        .clickable-title:hover {
            filter: brightness(0.9);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, deleteDoc, addDoc, query, getDoc } from "firebase/firestore";

        const { useState, useEffect, useMemo } = React;

        const productionConfig = {
            apiKey: "AIzaSyAbqfNeh1p-jGp0vGl6K85N-SJSi7DPwn0",
            authDomain: "tukatsbolos.firebaseapp.com",
            projectId: "tukatsbolos",
            storageBucket: "tukatsbolos.firebasestorage.app",
            messagingSenderId: "74618830888",
            appId: "1:74618830888:web:a8e08918d802ab1498751d"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : productionConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tukats-batucada-v1';

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                'log-out': <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
                'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                hourglass: <><path d="M5 2h14M5 22h14M15 2v5l-3 3-3-3V2M9 22v-5l3-3 3 3v5"/></>,
                key: <><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.778-7.778Zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3-3.5 3.5Z"/></>,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                car: <><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></>,
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                user: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
                'chevron-up': <polyline points="18 15 12 9 6 15" />,
                'chevron-down': <polyline points="6 9 12 15 18 9" />
            };
            return (
                <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const DEFAULT_MEMBERS = ["Jesus", "Merche", "Txis", "Josep", "Nacho", "Mon", "Claudia", "Toñi", "Alba", "Viñet", "Evelyn", "Dahna", "DavidB", "David", "Xavi", "Johny", "Valentin", "JosepA", "Merce", "Lorena", "Bruna", "Emily", "Valentina", "Carmen", "Maria", "Marta", "Paula", "Ona", "Aina", "Lluis", "Ernest"].sort();
        const INSTRUMENTS = ["1a", "2a", "3a", "Caixa", "Timba", "Xapa", "Tamborin", "Repe"];
        const MESOS = ["Gener", "Febrer", "Març", "Abril", "Maig", "Juny", "Juliol", "Agost", "Setembre", "Octubre", "Novembre", "Desembre"];

        function App() {
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [bolos, setBolos] = useState([]);
            const [selectedBolo, setSelectedBolo] = useState(null);
            const [activeTab, setActiveTab] = useState('instruments');
            
            const [members, setMembers] = useState(DEFAULT_MEMBERS);
            const [attendance, setAttendance] = useState({});
            const [assignments, setAssignments] = useState({});
            const [carData, setCarData] = useState(Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })));
            const [foodData, setFoodData] = useState({ standard: [], vegan: [], glutenFree: [], glutenFreeVegan: [] });
            const [boloSettings, setBoloSettings] = useState({ carsEnabled: false, foodEnabled: false });
            const [carCosts, setCarCosts] = useState({ enabled: false, distancia: "", consum: "6.5", preuLitre: "1.40", proposta: "" });
            
            const [settings, setSettings] = useState({ userPass: "TUKATS", adminPass: "ADMIN" });
            const [isLoading, setIsLoading] = useState(true);
            const [personToMove, setPersonToMove] = useState(null);

            const [showBoloModal, setShowBoloModal] = useState(false);
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [showMembersModal, setShowMembersModal] = useState(false);
            const [editingBoloData, setEditingBoloData] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(async () => {
                            await signInAnonymously(auth);
                        });
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), snap => {
                    if (snap.exists()) setSettings(snap.data());
                });
                const unsubMembers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'members_list', 'current'), snap => {
                    if (snap.exists()) {
                        const list = snap.data().names || [];
                        setMembers(list.sort());
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members_list', 'current'), { names: DEFAULT_MEMBERS });
                    }
                });
                const unsubBolos = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'bolos'), snap => {
                    const bolosList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBolos(bolosList);
                    if (selectedBolo) {
                        const updated = bolosList.find(d => d.id === selectedBolo.id);
                        if (updated) setSelectedBolo(updated);
                    }
                });
                return () => { unsubSettings(); unsubBolos(); unsubMembers(); };
            }, [user, selectedBolo?.id]);

            useEffect(() => {
                if (!user || !selectedBolo) return;
                setIsLoading(true);
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', selectedBolo.id), snap => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setAttendance(d.attendance || {});
                        setAssignments(d.assignments || {});
                        setCarData(d.carData || Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })));
                        const fd = d.foodData || {};
                        setFoodData({
                            standard: fd.standard || [], vegan: fd.vegan || [],
                            glutenFree: fd.glutenFree || [], glutenFreeVegan: fd.glutenFreeVegan || []
                        });
                        setBoloSettings(d.boloSettings || { carsEnabled: false, foodEnabled: false });
                        const cc = d.carCosts || {};
                        setCarCosts({
                            enabled: cc.enabled || false,
                            distancia: cc.distancia !== undefined ? cc.distancia : "",
                            consum: cc.consum !== undefined ? cc.consum : "6.5",
                            preuLitre: cc.preuLitre !== undefined ? cc.preuLitre : "1.40",
                            proposta: cc.proposta !== undefined ? cc.proposta : ""
                        });
                    }
                    setIsLoading(false);
                });
                return () => unsub();
            }, [user, selectedBolo?.id]);

            const syncBoloData = async (updates) => {
                if (!user || !selectedBolo) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', selectedBolo.id);
                const boloRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id);
                
                const finalAtt = updates.attendance || attendance;
                const finalAss = updates.assignments || assignments;
                const finalSettings = updates.boloSettings || boloSettings;
                const finalCarCosts = updates.carCosts || carCosts;

                let finalCarData = updates.carData || carData;
                const validPeopleForCars = members.filter(p => finalAss[p] !== null && finalAss[p] !== undefined || finalAtt[p] === 'blue');
                
                finalCarData = finalCarData.map(car => ({
                    ...car,
                    driver: validPeopleForCars.includes(car.driver) ? car.driver : null,
                    passengers: car.passengers.filter(p => validPeopleForCars.includes(p))
                }));

                const counts = {
                    memberCount: Object.values(finalAss).filter(v => v !== null).length,
                    declinedCount: Object.values(finalAtt).filter(v => v === 'red').length,
                    watchingCount: Object.values(finalAtt).filter(v => v === 'blue').length,
                };
                counts.pendingCount = members.length - counts.memberCount - counts.declinedCount - counts.watchingCount;

                try {
                    await updateDoc(docRef, { 
                        attendance: finalAtt, assignments: finalAss,
                        carData: finalCarData, foodData: updates.foodData || foodData,
                        boloSettings: finalSettings, carCosts: finalCarCosts
                    });
                    await updateDoc(boloRef, { ...counts, carsEnabled: !!finalSettings.carsEnabled, foodEnabled: !!finalSettings.foodEnabled });
                } catch (e) { console.error(e); }
            };

            const getBoloDateTime = (b) => {
                if (!b.fecha) return new Date(0);
                const [y, m, d] = b.fecha.split('-').map(Number);
                const [hh, mm] = (b.hora || "00:00").split(':').map(Number);
                return new Date(y, m - 1, d, hh, mm);
            };

            const esPasado = (b) => getBoloDateTime(b) < new Date();

            const getFormattedDateBadge = (fechaStr) => {
                if (!fechaStr) return { day: "?", month: "?" };
                const [y, m, d] = fechaStr.split('-').map(Number);
                return { day: d, month: MESOS[m - 1] };
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const target = isAdminMode ? settings.adminPass : settings.userPass;
                if (passwordInput === target) {
                    setIsLoggedIn(true);
                    setIsAdminAuth(isAdminMode);
                    setPasswordInput("");
                }
            };

            const handleDeleteBolo = async (id, e) => {
                e.stopPropagation();
                if (!confirm("Segur que vols eliminar aquest bolo?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', id));
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', id));
                } catch (err) { console.error(err); }
            };

            const handleSaveBolo = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = { 
                    nombre: formData.get('nombre'), 
                    fecha: formData.get('fecha'), 
                    hora: formData.get('hora'), 
                    duracion: formData.get('duracion'), 
                    lugar: formData.get('lugar') 
                };
                try {
                    if (editingBoloData) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', editingBoloData.id), data);
                    } else {
                        const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'bolos'), {
                            ...data, memberCount: 0, pendingCount: members.length, declinedCount: 0, watchingCount: 0,
                            info: "", carsEnabled: false, foodEnabled: false, precio: 0, googleMaps: ""
                        });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', docRef.id), {
                            attendance: {}, assignments: {}, 
                            carData: Array.from({length: 8}, (_, i) => ({ id: i+1, driver: null, capacity: 4, passengers: [] })),
                            foodData: { standard: [], vegan: [], glutenFree: [], glutenFreeVegan: [] },
                            boloSettings: { carsEnabled: false, foodEnabled: false },
                            carCosts: { enabled: false, distancia: "", consum: "6.5", preuLitre: "1.40", proposta: "" }
                        });
                    }
                    setShowBoloModal(false);
                    setEditingBoloData(null);
                } catch (err) { console.error(err); }
            };

            const handleUpdateMembers = async (newList, removedName = null) => {
                setMembers(newList.sort());
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members_list', 'current'), { names: newList });
                
                if (removedName) {
                    const futureBolos = bolos.filter(b => !esPasado(b));
                    for (const bolo of futureBolos) {
                        const attRef = doc(db, 'artifacts', appId, 'public', 'data', 'bolos_attendance', bolo.id);
                        const attSnap = await getDoc(attRef);
                        if (attSnap.exists()) {
                            const d = attSnap.data();
                            const newAtt = { ...(d.attendance || {}) };
                            const newAss = { ...(d.assignments || {}) };
                            const newFood = { ...(d.foodData || {}) };
                            let updated = false;

                            if (newAtt[removedName]) { delete newAtt[removedName]; updated = true; }
                            if (newAss[removedName]) { delete newAss[removedName]; updated = true; }
                            Object.keys(newFood).forEach(cat => {
                                if (newFood[cat]?.includes(removedName)) {
                                    newFood[cat] = newFood[cat].filter(n => n !== removedName);
                                    updated = true;
                                }
                            });
                            
                            const newCarData = (d.carData || []).map(car => {
                                let carUpdated = false;
                                let driver = car.driver;
                                let passengers = [...(car.passengers || [])];
                                if (driver === removedName) { driver = null; carUpdated = true; }
                                if (passengers.includes(removedName)) {
                                    passengers = passengers.filter(p => p !== removedName);
                                    carUpdated = true;
                                }
                                if (carUpdated) updated = true;
                                return { ...car, driver, passengers };
                            });

                            if (updated) {
                                await updateDoc(attRef, { 
                                    attendance: newAtt, assignments: newAss, 
                                    foodData: newFood, carData: newCarData 
                                });
                                // Actualització de comptes al bolo
                                const counts = {
                                    memberCount: Object.values(newAss).filter(v => v !== null).length,
                                    declinedCount: Object.values(newAtt).filter(v => v === 'red').length,
                                    watchingCount: Object.values(newAtt).filter(v => v === 'blue').length,
                                };
                                counts.pendingCount = newList.length - counts.memberCount - counts.declinedCount - counts.watchingCount;
                                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', bolo.id), counts);
                            }
                        }
                    }
                }
            };

            const availablePeople = useMemo(() => {
                return members.filter(p => (assignments[p] && assignments[p] !== null) || attendance[p] === 'blue');
            }, [attendance, assignments, members]);

            const movePersonToCategory = (target) => {
                if (!personToMove) return;
                let newAtt = { ...attendance };
                let newAss = { ...assignments };
                if (target === 'pending') { delete newAtt[personToMove]; newAss[personToMove] = null; }
                else if (target === 'blue') { newAtt[personToMove] = 'blue'; newAss[personToMove] = null; }
                else if (target === 'red') { newAtt[personToMove] = 'red'; newAss[personToMove] = null; }
                else { newAtt[personToMove] = 'green'; newAss[personToMove] = target; }
                syncBoloData({ attendance: newAtt, assignments: newAss });
                setPersonToMove(null);
            };

            const renderInstrumentsTab = () => (
                <div className="flex-1 flex flex-row overflow-hidden">
                    <aside className="w-[110px] md:w-80 bg-white/20 border-r-2 border-white/30 p-2 flex flex-col shrink-0 overflow-y-auto custom-scrollbar">
                        <div className="flex flex-col min-h-0 mb-4">
                            <h3 onClick={() => movePersonToCategory('pending')} className={`text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center tracking-[0.1em] text-orange-700 bg-orange-100/50 py-1 rounded-lg italic shrink-0 ${personToMove ? 'clickable-title cursor-pointer' : ''}`}>Pendents</h3>
                            <div className="person-list-container custom-scrollbar flex flex-col gap-1.5">{members.filter(p => !assignments[p] && !['red', 'blue'].includes(attendance[p])).map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)} className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-white/40 shadow-sm ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}</div>
                        </div>
                        <div className="flex flex-col min-h-0 mb-4">
                            <h3 onClick={() => movePersonToCategory('blue')} className={`text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center tracking-[0.1em] text-blue-700 bg-blue-100/50 py-1 rounded-lg italic shrink-0 ${personToMove ? 'clickable-title cursor-pointer' : ''}`}>Mirar</h3>
                            <div className="person-list-container custom-scrollbar flex flex-col gap-1.5">{members.filter(p => attendance[p] === 'blue').map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)} className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-blue-100 text-blue-700 shadow-sm ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}</div>
                        </div>
                        <div className="flex flex-col min-h-0 mb-4">
                            <h3 onClick={() => movePersonToCategory('red')} className={`text-[12px] md:text-[18px] font-black uppercase mb-1.5 text-center tracking-[0.1em] text-red-700 bg-red-100/50 py-1 rounded-lg italic shrink-0 ${personToMove ? 'clickable-title cursor-pointer' : ''}`}>No Puc</h3>
                            <div className="person-list-container custom-scrollbar flex flex-col gap-1.5">{members.filter(p => attendance[p] === 'red').map(p => (
                                <div key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={() => setPersonToMove(personToMove === p ? null : p)} className={`p-2 md:p-4 rounded-xl text-[12px] md:text-[24px] font-black text-center cursor-grab bg-red-100 text-red-700 shadow-sm ${personToMove === p ? 'person-selected' : ''}`}>{p}</div>
                            ))}</div>
                        </div>
                    </aside>
                    <main className="flex-1 p-2 md:p-4 grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4 overflow-y-auto custom-scrollbar content-start pb-4">
                        {INSTRUMENTS.map(inst => (
                            <div key={inst} onDragOver={e=>e.preventDefault()} onDrop={e => {
                                const p = e.dataTransfer.getData("p");
                                syncBoloData({ assignments: { ...assignments, [p]: inst }, attendance: { ...attendance, [p]: 'green' } });
                            }} onClick={() => movePersonToCategory(inst)}
                                className={`bg-white/40 rounded-xl md:rounded-[2rem] p-2 md:p-4 border border-white/40 shadow-inner min-h-[120px] transition-all ${personToMove ? 'cursor-pointer hover:bg-green-100/40' : ''}`}>
                                <h3 className="text-[14px] md:text-[16px] font-black uppercase mb-1 border-b-2 border-green-900/10 italic">{inst}</h3>
                                <div className="flex-wrap gap-1 flex">
                                    {members.filter(p => assignments[p] === inst).map(p => (
                                        <span key={p} draggable onDragStart={e => e.dataTransfer.setData("p", p)} onClick={(e) => { e.stopPropagation(); setPersonToMove(personToMove === p ? null : p); }}
                                            className={`text-[12px] md:text-[24px] font-black text-green-700 cursor-grab ${personToMove === p ? 'person-selected' : ''}`}>{p}</span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );

            const renderInfoTab = () => (
                <div className="flex-1 p-4 md:p-8 flex flex-col overflow-hidden">
                    <h3 className="text-2xl font-black uppercase italic mb-4">Informació Extra</h3>
                    
                    {!isAdminAuth && selectedBolo.googleMaps && (
                        <a 
                            href={selectedBolo.googleMaps} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="flex items-center gap-3 bg-white/80 p-4 rounded-2xl mb-6 shadow-md border-2 border-green-500/20 hover:bg-white active:scale-95 transition-all text-green-800"
                        >
                            <div className="bg-green-100 p-3 rounded-xl">
                                <Icon name="map-pin" size={24} className="text-green-700" />
                            </div>
                            <span className="text-xl font-black uppercase italic">Ubicació</span>
                        </a>
                    )}

                    {isAdminAuth && (
                        <div className="space-y-4 mb-4">
                            <div className="bg-white/50 p-4 rounded-3xl border-2 border-dashed border-green-600/30">
                                <label className="block text-xs font-black uppercase opacity-60 mb-2">VALOR DEL BOLO (€) - Només Admin</label>
                                <div className="flex items-center gap-4">
                                    <input 
                                        type="number" 
                                        className="w-1/2 md:flex-1 p-4 bg-white rounded-2xl font-black text-2xl text-green-700 outline-none focus:ring-2 ring-green-500 shadow-inner"
                                        defaultValue={selectedBolo.precio || 0}
                                        onBlur={async (e) => {
                                            const newVal = parseInt(e.target.value) || 0;
                                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id), { precio: newVal });
                                        }}
                                    />
                                    <span className="text-2xl font-black text-green-900">€</span>
                                </div>
                            </div>

                            <div className="bg-white/50 p-4 rounded-3xl border-2 border-dashed border-blue-600/30">
                                <label className="block text-xs font-black uppercase opacity-60 mb-2">ENLLAÇ GOOGLE MAPS - Només Admin</label>
                                <div className="flex items-center gap-4">
                                    <div className="bg-blue-100 p-3 rounded-xl shrink-0">
                                        <Icon name="map-pin" size={20} className="text-blue-700" />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Enganxa aquí l'enllaç de Google Maps..."
                                        className="flex-1 p-4 bg-white rounded-2xl font-bold text-sm text-blue-900 outline-none focus:ring-2 ring-blue-500 shadow-inner"
                                        defaultValue={selectedBolo.googleMaps || ""}
                                        onBlur={async (e) => {
                                            const newVal = e.target.value;
                                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id), { googleMaps: newVal });
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {isAdminAuth ? (
                        <textarea className="flex-1 w-full p-6 bg-white/70 rounded-3xl border-2 border-transparent focus:border-blue-500 outline-none font-bold text-lg md:text-xl resize-none shadow-xl mb-12"
                            placeholder="Afegeix aquí informació sobre el bolo..."
                            defaultValue={selectedBolo.info}
                            onBlur={async (e) => {
                                const newVal = e.target.value;
                                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bolos', selectedBolo.id), { info: newVal });
                                setSelectedBolo({...selectedBolo, info: newVal});
                            }} />
                    ) : (
                        <div className="flex-1 p-6 bg-white/70 rounded-3xl font-bold text-lg md:text-xl whitespace-pre-wrap shadow-xl overflow-y-auto custom-scrollbar pb-24">
                            {selectedBolo.info || "No hi ha informació addicional disponible."}
                        </div>
                    )}
                </div>
            );

            if (!isLoggedIn) return (
                <div className="h-screen w-screen flex flex-col items-center pt-8 md:pt-20 p-4 overflow-y-auto">
                    <div className="flex flex-col items-center w-[90%] md:w-full md:max-w-sm">
                        <div className="mb-4 md:mb-6 w-full rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white/50 bg-white">
                            <img 
                                src="Logo_Quadrat.jpg" 
                                alt="Logo Tukats" 
                                className="w-full h-auto block"
                                onError={(e) => e.target.parentElement.style.display = 'none'}
                            />
                        </div>
                        <div className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl w-full border-t-[10px] border-green-600">
                            <h1 className="text-3xl md:text-4xl font-black text-center mb-6 md:mb-8 text-green-900 uppercase tracking-tighter italic leading-none">Login</h1>
                            <form onSubmit={handleLogin} className="space-y-4 md:space-y-6">
                                <div className="flex items-center space-x-3 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                    <input type="checkbox" id="adm" checked={isAdminMode} onChange={e => setIsAdminMode(e.target.checked)} className="w-6 h-6 accent-green-600 cursor-pointer" />
                                    <label htmlFor="adm" className="text-sm font-black text-gray-700 cursor-pointer select-none uppercase tracking-tight">Mode Administrador</label>
                                </div>
                                <input type="password" placeholder="Contrasenya" className="w-full p-4 md:p-5 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 outline-none text-xl font-bold" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} required />
                                <button type="submit" className="w-full bg-green-600 text-white font-black py-4 md:py-5 rounded-2xl hover:bg-green-700 shadow-xl uppercase tracking-widest text-lg active:scale-95 transition-transform">Entrar</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            if (!selectedBolo) {
                const sortedBolos = [...bolos].sort((a, b) => getBoloDateTime(a) - getBoloDateTime(b));
                const futureBolos = sortedBolos.filter(b => !esPasado(b));
                const pastBolos = sortedBolos.filter(b => esPasado(b)).reverse();

                return (
                    <div className="h-screen w-screen flex flex-col overflow-hidden text-green-950">
                        <header className="px-3 py-3 md:px-6 md:py-4 bg-white/20 backdrop-blur-md flex justify-between items-center shrink-0 border-b border-white/20">
                            <div className="flex items-center gap-2 md:gap-3 shrink-0">
                                <h2 className="text-[18px] sm:text-xl md:text-2xl font-black italic tracking-tighter uppercase leading-none">TUKATS - BOLOS</h2>
                            </div>
                            <div className="flex gap-2">
                                {isAdminAuth && (
                                    <>
                                        <button onClick={() => setShowMembersModal(true)} className="p-2 md:p-3 bg-white/50 text-green-900 rounded-xl shadow-sm"><Icon name="user" size={20}/></button>
                                        <button onClick={() => setShowConfigModal(true)} className="p-2 md:p-3 bg-white/50 text-blue-900 rounded-xl shadow-sm"><Icon name="settings" size={20}/></button>
                                    </>
                                )}
                                <button onClick={() => setIsLoggedIn(false)} className="bg-red-600 text-white px-3 py-2 rounded-xl font-black flex items-center gap-1.5 shadow-md text-xs shrink-0"><Icon name="log-out" size={14}/> <span className="hidden sm:inline">Sortir</span></button>
                            </div>
                        </header>
                        <main className="flex-1 p-2 md:p-8 flex flex-col items-center overflow-hidden">
                            <div className="w-full max-w-5xl bg-white/40 rounded-[2rem] md:rounded-[3rem] p-2 md:p-8 flex flex-col overflow-hidden shadow-2xl border border-white/40">
                                {isAdminAuth && (
                                    <div className="mb-6 flex justify-end px-2">
                                        <button onClick={() => { setEditingBoloData(null); setShowBoloModal(true); }} className="bg-green-600 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2 hover:bg-green-700 uppercase tracking-tighter shadow-lg shadow-green-600/20 active:scale-95"><Icon name="plus" size={18}/> Nou Bolo</button>
                                    </div>
                                )}
                                <div className="flex-1 overflow-y-auto pr-1 md:pr-3 custom-scrollbar space-y-8 pb-32">
                                    <section>
                                        <h3 className="text-2xl md:text-4xl font-black mb-4 uppercase border-b border-green-900/10 pb-2 italic tracking-tighter">Propers Bolos</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 px-2">{futureBolos.map(renderBoloCard)}</div>
                                    </section>
                                    <section>
                                        <h3 className="text-2xl md:text-4xl font-black mb-4 uppercase border-b border-green-900/10 pb-2 italic tracking-tighter opacity-40">Bolos Passats</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 px-2">{pastBolos.map(renderBoloCard)}</div>
                                    </section>
                                </div>
                            </div>
                        </main>
                        {showBoloModal && <BoloModal editingBoloData={editingBoloData} onSave={handleSaveBolo} onClose={() => setShowBoloModal(false)} />}
                        {showConfigModal && <ConfigModal settings={settings} onUpdate={handleUpdatePasswords} onClose={() => setShowConfigModal(false)} />}
                        {showMembersModal && <MembersModal members={members} onUpdate={handleUpdateMembers} onClose={() => setShowMembersModal(false)} />}
                    </div>
                );
            }

            const confirmedCount = Object.values(assignments).filter(v => v !== null).length;
            const declinedCount = Object.values(attendance).filter(v => v === 'red').length;
            const watchingCount = Object.values(attendance).filter(v => v === 'blue').length;
            const pendingCount = members.length - confirmedCount - declinedCount - watchingCount;

            const isInfoDisabled = !isAdminAuth && !selectedBolo.info;
            const isCarsDisabled = !isAdminAuth && !boloSettings.carsEnabled;
            const isFoodDisabled = !isAdminAuth && !boloSettings.foodEnabled;

            return (
                <div className="h-screen w-screen flex flex-col overflow-hidden text-green-950">
                    <header className="bg-white/30 backdrop-blur-md border-b border-white/20 px-3 py-3 md:px-6 md:py-4 shrink-0">
                        <h2 className="text-[22px] md:text-4xl font-black italic leading-none tracking-tighter mb-4">{selectedBolo?.nombre}</h2>
                        <div className="flex gap-2 md:gap-4 mb-4">
                            <button onClick={() => { setActiveTab('instruments'); setPersonToMove(null); }} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'instruments' ? 'btn-3d-pushed bg-green-500 text-white' : 'btn-3d-raised bg-white text-green-900'}`}>INSTRUMENTS</button>
                            <button onClick={() => !isInfoDisabled && setActiveTab('info')} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'info' ? 'btn-3d-pushed bg-blue-600 text-white' : 'btn-3d-raised bg-white text-blue-900'} ${isInfoDisabled ? 'opacity-30 pointer-events-none' : ''}`}>INFORMACIÓ</button>
                            <button onClick={() => !isCarsDisabled && setActiveTab('cars')} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'cars' ? 'btn-3d-pushed bg-amber-800 text-white' : 'btn-3d-raised bg-white text-amber-900'} ${isCarsDisabled ? 'opacity-30 pointer-events-none' : ''}`}>COTXES</button>
                            <button onClick={() => !isFoodDisabled && setActiveTab('food')} className={`flex-1 py-3 md:py-5 rounded-xl md:rounded-2xl font-black uppercase italic tracking-tighter text-[11px] md:text-xl transition-all ${activeTab === 'food' ? 'btn-3d-pushed bg-purple-600 text-white' : 'btn-3d-raised bg-white text-purple-900'} ${isFoodDisabled ? 'opacity-30 pointer-events-none' : ''}`}>MENJAR</button>
                        </div>
                        <div className="flex items-center justify-between w-full gap-2">
                            <div className="flex items-center bg-black/5 rounded-xl p-1.5 md:px-6 md:py-3 gap-1 md:gap-6 flex-1 justify-between">
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-green-700">{confirmedCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase opacity-50">OK</div>
                                </div>
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-orange-600">{pendingCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase opacity-50">?</div>
                                </div>
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-red-600">{declinedCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase opacity-50">NO</div>
                                </div>
                                <div className="text-center flex-1">
                                    <div className="text-xl md:text-2xl font-black leading-none text-blue-600">{watchingCount}</div>
                                    <div className="text-[11px] md:text-base font-black uppercase flex items-center justify-center pt-0.5"><Icon name="eye" size={15}/></div>
                                </div>
                            </div>
                            <button onClick={() => { setSelectedBolo(null); setActiveTab('instruments'); setPersonToMove(null); }} className="bg-red-600 text-white px-4 py-2.5 rounded-xl font-black text-[14px] uppercase shadow-xl active:scale-95 shrink-0">Tornar</button>
                        </div>
                    </header>
                    {isLoading ? <div className="flex-1 flex items-center justify-center"><div className="w-16 h-16 border-4 border-green-600 border-t-transparent rounded-full loading-spin"></div></div> : (
                        <>
                            {activeTab === 'instruments' && renderInstrumentsTab()}
                            {activeTab === 'info' && renderInfoTab()}
                            {activeTab === 'cars' && (boloSettings.carsEnabled || isAdminAuth) && renderCarsTab()}
                            {activeTab === 'food' && (boloSettings.foodEnabled || isAdminAuth) && renderFoodTab()}
                        </>
                    )}
                </div>
            );
        }

        const MembersModal = ({ members, onUpdate, onClose }) => {
            const [newName, setNewName] = useState("");
            const handleAdd = (e) => {
                e.preventDefault();
                if (!newName.trim() || members.includes(newName.trim())) return;
                onUpdate([...members, newName.trim()]);
                setNewName("");
            };
            const handleRemove = (name) => {
                if (!confirm(`Segur que vols donar de baixa a ${name}?`)) return;
                onUpdate(members.filter(n => n !== name), name);
            };
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl flex flex-col max-h-[90vh]">
                        <h3 className="text-3xl font-black uppercase italic mb-6 text-green-900">Gestió Membres</h3>
                        <form onSubmit={handleAdd} className="flex gap-2 mb-6">
                            <input 
                                value={newName}
                                onChange={e => setNewName(e.target.value)}
                                placeholder="Nom nou membre" 
                                className="flex-1 p-4 bg-gray-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-green-500"
                            />
                            <button type="submit" className="bg-green-600 text-white p-4 rounded-2xl font-black"><Icon name="plus" size={24}/></button>
                        </form>
                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                            {members.map(name => (
                                <div key={name} className="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                    <span className="font-bold text-lg">{name}</span>
                                    <button onClick={() => handleRemove(name)} className="text-red-500 p-2 hover:bg-red-50 rounded-xl transition-colors">
                                        <Icon name="trash" size={18}/>
                                    </button>
                                </div>
                            ))}
                        </div>
                        <button onClick={onClose} className="mt-6 w-full py-4 bg-gray-200 text-gray-700 font-black rounded-2xl uppercase">Tancar</button>
                    </div>
                </div>
            );
        };

        const BoloModal = ({ editingBoloData, onSave, onClose }) => (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                <div className="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
                    <h3 className="text-3xl font-black uppercase italic mb-6 text-green-900">{editingBoloData ? 'Editar' : 'Nou'} Bolo</h3>
                    <form onSubmit={onSave} className="space-y-4">
                        <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase opacity-50 ml-2">NOM DEL BOLO</label>
                            <input name="nombre" defaultValue={editingBoloData?.nombre} placeholder="Nom del bolo" className="w-full p-4 bg-gray-100 rounded-2xl font-bold border-2 border-transparent focus:border-green-500 outline-none" required />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black uppercase opacity-50 ml-2">DATA</label>
                                <input name="fecha" type="date" defaultValue={editingBoloData?.fecha} className="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none" required />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black uppercase opacity-50 ml-2">HORA</label>
                                <input name="hora" type="time" defaultValue={editingBoloData?.hora} className="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none" required />
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black uppercase opacity-50 ml-2">LLOC</label>
                                <input name="lugar" defaultValue={editingBoloData?.lugar} placeholder="Lloc" className="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none" required />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black uppercase opacity-50 ml-2">DURADA</label>
                                <input name="duracion" defaultValue={editingBoloData?.duracion} placeholder="Ex: 1h 30min" className="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none" />
                            </div>
                        </div>
                        <div className="flex gap-3 pt-6">
                            <button type="button" onClick={onClose} className="flex-1 py-4 bg-gray-200 text-gray-700 font-black rounded-2xl uppercase transition-all">Cancel·lar</button>
                            <button type="submit" className="flex-1 py-4 bg-green-600 text-white font-black rounded-2xl uppercase shadow-lg shadow-green-600/20 transition-all">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        );

        const ConfigModal = ({ settings, onUpdate, onClose }) => (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
                    <h3 className="text-3xl font-black uppercase italic mb-6 text-blue-900">Ajustos</h3>
                    <form onSubmit={onUpdate} className="space-y-4">
                        <input name="userPass" defaultValue={settings.userPass} placeholder="User Pass" className="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none" required />
                        <input name="adminPass" defaultValue={settings.adminPass} placeholder="Admin Pass" className="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none" required />
                        <div className="flex gap-3 pt-4">
                            <button type="button" onClick={onClose} className="flex-1 py-4 bg-gray-200 text-gray-700 font-black rounded-2xl uppercase transition-all">Tancar</button>
                            <button type="submit" className="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl uppercase transition-all">Actualitzar</button>
                        </div>
                    </form>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
